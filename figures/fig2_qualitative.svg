<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 732 420" width="732" height="420" font-family="Arial,Helvetica,sans-serif">
  <rect width="732" height="420" fill="white"/>

  <!-- Title -->
  <text x="366" y="16" text-anchor="middle" font-size="8" font-weight="bold" fill="#202124">Figure 2: Cross-Domain Qualitative Comparison (LCDMoire → TIP2018)</text>

  <!-- ====== Row 1: Full images ====== -->
  <text x="12" y="38" font-size="7" font-weight="bold" fill="#202124">a</text>
  <text x="12" y="105" font-size="7" font-weight="bold" fill="#202124">b</text>

  <!-- Input (moire) -->
  <rect x="12" y="45" width="168" height="130" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="96" y="56" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#E65100">Input (TIP2018)</text>
  <rect x="30" y="65" width="132" height="95" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <text x="96" y="115" text-anchor="middle" font-size="6" fill="#9AA0A6">[Real moire image]</text>

  <!-- WDNet frozen -->
  <rect x="192" y="45" width="168" height="130" rx="3" fill="#FCE8E6" stroke="#D93025" stroke-width="0.8"/>
  <text x="276" y="56" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#D93025">WDNet (frozen)</text>
  <rect x="210" y="65" width="132" height="95" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <text x="276" y="115" text-anchor="middle" font-size="6" fill="#9AA0A6">[WDNet output — residual moire]</text>

  <!-- MoTA (ours) -->
  <rect x="372" y="45" width="168" height="130" rx="3" fill="#E6F4EA" stroke="#1A73E8" stroke-width="0.8"/>
  <text x="456" y="56" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#1A73E8">MoTA (ours, T=15)</text>
  <rect x="390" y="65" width="132" height="95" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <text x="456" y="115" text-anchor="middle" font-size="6" fill="#9AA0A6">[MoTA output — moire removed]</text>

  <!-- Ground Truth -->
  <rect x="552" y="45" width="168" height="130" rx="3" fill="#E8F5E9" stroke="#34A853" stroke-width="0.8"/>
  <text x="636" y="56" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#34A853">Ground Truth</text>
  <rect x="570" y="65" width="132" height="95" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <text x="636" y="115" text-anchor="middle" font-size="6" fill="#9AA0A6">[Clean reference]</text>

  <!-- Metrics row -->
  <text x="276" y="183" text-anchor="middle" font-size="6" fill="#D93025">PSNR/SSIM: —/—</text>
  <text x="456" y="183" text-anchor="middle" font-size="6" fill="#1A73E8">PSNR/SSIM: —/— (+X.XX dB)</text>
  <text x="636" y="183" text-anchor="middle" font-size="6" fill="#34A853">PSNR/SSIM: ∞/1.000</text>

  <!-- ====== Row 2: Zoomed patches ====== -->
  <text x="12" y="210" font-size="7" font-weight="bold" fill="#202124">c</text>

  <!-- Patch 1 -->
  <rect x="12" y="218" width="168" height="80" rx="2" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="96" y="234" text-anchor="middle" font-size="6" fill="#E65100">Patch A (texture region)</text>
  <rect x="40" y="242" width="48" height="48" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.4"/>
  <rect x="96" y="242" width="48" height="48" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.4"/>
  <rect x="152" y="242" width="48" height="48" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.4"/>

  <!-- Patch 2 -->
  <rect x="192" y="218" width="168" height="80" rx="2" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="276" y="234" text-anchor="middle" font-size="6" fill="#E65100">Patch B (moire-dense region)</text>
  <rect x="220" y="242" width="48" height="48" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.4"/>
  <rect x="276" y="242" width="48" height="48" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.4"/>
  <rect x="332" y="242" width="48" height="48" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.4"/>

  <!-- ====== Row 3: Difference map ====== -->
  <text x="12" y="316" font-size="7" font-weight="bold" fill="#202124">d</text>

  <rect x="12" y="324" width="168" height="80" rx="3" fill="#F1F3F4" stroke="#9AA0A6" stroke-width="0.6"/>
  <text x="96" y="340" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#202124">|WDNet − GT|</text>
  <rect x="30" y="350" width="132" height="46" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.4"/>
  <text x="96" y="376" text-anchor="middle" font-size="6" fill="#9AA0A6">[Residual moire visible]</text>

  <rect x="192" y="324" width="168" height="80" rx="3" fill="#E6F4EA" stroke="#1A73E8" stroke-width="0.6"/>
  <text x="276" y="340" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#1A73E8">|MoTA − GT|</text>
  <rect x="210" y="350" width="132" height="46" rx="2" fill="#F5F5F5" stroke="#DDD" stroke-width="0.4"/>
  <text x="276" y="376" text-anchor="middle" font-size="6" fill="#9AA0A6">[Significantly cleaner]</text>

  <!-- ====== Legend ====== -->
  <text x="400" y="370" font-size="6" fill="#5F6368">Patches zoomed 3× from red-box regions in full images. Difference maps: |output − GT|, brighter = larger error.</text>
  <text x="400" y="385" font-size="6" fill="#5F6368">Images from TIP2018 test set. All methods trained on LCDMoire only. TTA applied at inference (no TIP2018 training data).</text>
</svg>

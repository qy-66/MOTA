<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 732 480" width="732" height="480" font-family="Arial,Helvetica,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#202124"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D93025"/>
    </marker>
  </defs>

  <rect width="732" height="480" fill="white"/>

  <!-- ====== Stage backgrounds ====== -->
  <!-- (a) MASS -->
  <rect x="140" y="255" width="460" height="170" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="0.8" opacity="0.5"/>
  <text x="148" y="269" font-size="7" font-weight="bold" fill="#1A73E8">a</text>
  <text x="370" y="269" font-size="7" font-weight="bold" fill="#1A73E8" text-anchor="middle">Stage 1: MASS Signal Generation</text>

  <!-- (b) Forward Pass -->
  <rect x="140" y="60" width="460" height="170" rx="6" fill="#E6F4EA" stroke="#34A853" stroke-width="0.8" opacity="0.5"/>
  <text x="148" y="74" font-size="7" font-weight="bold" fill="#34A853">b</text>
  <text x="370" y="74" font-size="7" font-weight="bold" fill="#34A853" text-anchor="middle">Stage 2: Adapter-Enhanced Forward Pass</text>

  <!-- (c) Optimization -->
  <rect x="620" y="60" width="100" height="365" rx="6" fill="#FEF7E0" stroke="#F9AB00" stroke-width="0.8" opacity="0.5"/>
  <text x="628" y="74" font-size="7" font-weight="bold" fill="#F9AB00">c</text>
  <text x="670" y="74" font-size="7" font-weight="bold" fill="#F9AB00" text-anchor="middle">Stage 3</text>
  <text x="670" y="85" font-size="7" font-weight="bold" fill="#F9AB00" text-anchor="middle">Test-Time</text>
  <text x="670" y="96" font-size="7" font-weight="bold" fill="#F9AB00" text-anchor="middle">Optimization</text>

  <!-- ====== Input Image ====== -->
  <rect x="12" y="195" width="105" height="110" rx="5" fill="#F1F3F4" stroke="#9AA0A6" stroke-width="1.2"/>
  <text x="64" y="232" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#202124">Input</text>
  <text x="64" y="244" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">Moire Image I</text>
  <text x="64" y="258" text-anchor="middle" font-size="6" fill="#5F6368">(HxWx3, [-1,1])</text>
  <g opacity="0.35">
    <line x1="22" y1="275" x2="107" y2="275" stroke="#D93025" stroke-width="0.6"/>
    <line x1="22" y1="282" x2="107" y2="282" stroke="#1A73E8" stroke-width="0.6"/>
    <line x1="22" y1="289" x2="107" y2="289" stroke="#D93025" stroke-width="0.6"/>
    <line x1="22" y1="296" x2="107" y2="296" stroke="#1A73E8" stroke-width="0.6"/>
  </g>

  <!-- ====== DWT Block ====== -->
  <rect x="158" y="285" width="130" height="110" rx="5" fill="white" stroke="#1A73E8" stroke-width="1"/>
  <text x="223" y="300" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">DWT Haar</text>
  <text x="223" y="312" text-anchor="middle" font-size="6" fill="#5F6368">4 subbands</text>
  <rect x="168" y="322" width="48" height="28" rx="3" fill="#D2E3FC" stroke="#1A73E8" stroke-width="0.4"/>
  <text x="192" y="339" text-anchor="middle" font-size="6.5" fill="#202124">LL</text>
  <rect x="228" y="322" width="48" height="28" rx="3" fill="#D2E3FC" stroke="#1A73E8" stroke-width="0.4"/>
  <text x="252" y="339" text-anchor="middle" font-size="6.5" fill="#202124">LH</text>
  <rect x="168" y="356" width="48" height="28" rx="3" fill="#D2E3FC" stroke="#1A73E8" stroke-width="0.4"/>
  <text x="192" y="373" text-anchor="middle" font-size="6.5" fill="#202124">HL</text>
  <rect x="228" y="356" width="48" height="28" rx="3" fill="#D2E3FC" stroke="#1A73E8" stroke-width="0.4"/>
  <text x="252" y="373" text-anchor="middle" font-size="6.5" fill="#202124">HH</text>

  <!-- ====== MFD Block ====== -->
  <rect x="318" y="285" width="120" height="110" rx="5" fill="white" stroke="#1A73E8" stroke-width="1"/>
  <text x="378" y="302" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#202124">MFD</text>
  <text x="378" y="318" text-anchor="middle" font-size="6" fill="#5F6368">4-layer CNN</text>
  <text x="378" y="332" text-anchor="middle" font-size="6" fill="#5F6368">12→32→64→64→3</text>
  <text x="378" y="348" text-anchor="middle" font-size="6" fill="#5F6368">Sigmoid → M∈[0,1]</text>
  <text x="378" y="366" text-anchor="middle" font-size="6" fill="#5F6368">(frozen during TTA)</text>

  <!-- ====== Attenuation Block ====== -->
  <rect x="468" y="285" width="115" height="110" rx="5" fill="white" stroke="#1A73E8" stroke-width="1"/>
  <text x="525" y="302" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">Selective</text>
  <text x="525" y="314" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">Attenuation</text>
  <text x="525" y="332" text-anchor="middle" font-size="6" fill="#202124">LH′=LH·(1-αM)</text>
  <text x="525" y="346" text-anchor="middle" font-size="6" fill="#202124">HL′=HL·(1-αM)</text>
  <text x="525" y="362" text-anchor="middle" font-size="6" fill="#5F6368">LL, HH unchanged</text>
  <text x="525" y="378" text-anchor="middle" font-size="6" fill="#5F6368">α = 0.5</text>

  <!-- ====== Pseudo-Clean Target ====== -->
  <rect x="614" y="290" width="95" height="100" rx="5" fill="#E8F5E9" stroke="#34A853" stroke-width="1.2"/>
  <text x="661" y="325" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">Pseudo-Clean</text>
  <text x="661" y="338" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">Target Ĩ</text>
  <text x="661" y="355" text-anchor="middle" font-size="6" fill="#5F6368">[-1, 1]</text>

  <!-- ====== Input Adapters ====== -->
  <rect x="158" y="100" width="75" height="85" rx="5" fill="white" stroke="#34A853" stroke-width="1"/>
  <text x="195" y="122" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">FDA₃</text>
  <text x="195" y="136" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">SGA₃</text>
  <text x="195" y="158" text-anchor="middle" font-size="6" fill="#5F6368">Input</text>
  <text x="195" y="170" text-anchor="middle" font-size="6" fill="#5F6368">Adapt</text>

  <!-- ====== Frozen Backbone ====== -->
  <rect x="268" y="100" width="225" height="85" rx="5" fill="#F1F3F4" stroke="#9AA0A6" stroke-width="1.2"/>
  <text x="380" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="#202124">Frozen Pre-trained Backbone fθ</text>
  <text x="380" y="152" text-anchor="middle" font-size="6.5" fill="#5F6368">(WDNet / DDA MBCNN / any demoiréing model)</text>
  <text x="380" y="168" text-anchor="middle" font-size="6" fill="#9AA0A6">θ frozen · requires_grad = False</text>

  <!-- ====== Output Adapters ====== -->
  <rect x="528" y="100" width="75" height="85" rx="5" fill="white" stroke="#34A853" stroke-width="1"/>
  <text x="565" y="122" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">FDA₃</text>
  <text x="565" y="136" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">SGA₃</text>
  <text x="565" y="158" text-anchor="middle" font-size="6" fill="#5F6368">Output</text>
  <text x="565" y="170" text-anchor="middle" font-size="6" fill="#5F6368">Adapt</text>

  <!-- ====== Output Image ====== -->
  <rect x="645" y="195" width="75" height="80" rx="5" fill="white" stroke="#34A853" stroke-width="1.2"/>
  <text x="682" y="222" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">Output</text>
  <text x="682" y="235" text-anchor="middle" font-size="7" font-weight="bold" fill="#202124">Î = fθ,φ(I)</text>
  <g opacity="0.25">
    <line x1="655" y1="255" x2="715" y2="255" stroke="#34A853" stroke-width="0.5"/>
    <line x1="655" y1="262" x2="715" y2="262" stroke="#34A853" stroke-width="0.5"/>
    <line x1="655" y1="269" x2="715" y2="269" stroke="#34A853" stroke-width="0.5"/>
  </g>

  <!-- ====== Arrows (black, main flow) ====== -->
  <line x1="117" y1="240" x2="153" y2="320" stroke="#202124" stroke-width="0.9" marker-end="url(#arr)"/>
  <line x1="288" y1="340" x2="313" y2="340" stroke="#202124" stroke-width="0.9" marker-end="url(#arr)"/>
  <line x1="438" y1="340" x2="463" y2="340" stroke="#202124" stroke-width="0.9" marker-end="url(#arr)"/>
  <line x1="583" y1="340" x2="609" y2="340" stroke="#202124" stroke-width="0.9" marker-end="url(#arr)"/>
  <line x1="117" y1="225" x2="153" y2="150" stroke="#202124" stroke-width="0.9" marker-end="url(#arr)"/>
  <line x1="233" y1="142" x2="263" y2="142" stroke="#202124" stroke-width="0.9" marker-end="url(#arr)"/>
  <line x1="493" y1="142" x2="523" y2="142" stroke="#202124" stroke-width="0.9" marker-end="url(#arr)"/>
  <line x1="603" y1="170" x2="640" y2="215" stroke="#202124" stroke-width="0.9" marker-end="url(#arr)"/>

  <!-- ====== Red dashed arrows (TTA loop) ====== -->
  <!-- Pseudo-clean → L_MASS -->
  <line x1="670" y1="290" x2="670" y2="250" stroke="#D93025" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <!-- Output → L_MASS -->
  <line x1="682" y1="195" x2="682" y2="250" stroke="#D93025" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <!-- Loss annotation -->
  <text x="700" y="240" font-size="6" fill="#D93025">Lmass=</text>
  <text x="700" y="250" font-size="6" fill="#D93025">||Î-Ĩ||₁</text>
  <!-- Gradient → adapters -->
  <line x1="682" y1="260" x2="640" y2="170" stroke="#D93025" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="698" y="215" font-size="6" fill="#D93025">∇φL</text>

  <!-- ====== Footer ====== -->
  <text x="12" y="470" font-size="6" fill="#5F6368">Red dashed: gradient updates φ only | θ (backbone) frozen | MFD frozen | T=15 steps, lr=1e-4, λreg=1e-6</text>
</svg>

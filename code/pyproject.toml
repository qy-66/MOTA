[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (未使用 import、未定义变量)
    "I",    # isort (import 排序)
    "W",    # pycodestyle warnings
    "UP",   # pyupgrade (新语法建议)
    "B",    # flake8-bugbear (常见 bug)
    "SIM",  # flake8-simplify (简化建议)
]
ignore = [
    "E501", # 行太长（已有 line-length 控制）
    "B008", # 函数参数默认值中调用函数
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
